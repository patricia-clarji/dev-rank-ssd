          in: query
          schema:
            type: string
          description: Filter by entity type
        - name: entityId
          in: query
          schema:
            type: string
          description: Filter by entity ID
        - name: startDate
          in: query
          schema:
            type: string
            format: date-time
          description: Filter from start date (ISO 8601)
        - name: endDate
          in: query
          schema:
            type: string
