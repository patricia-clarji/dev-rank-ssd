openapi: 3.0.0
info:
  title: DevRank API
  description: A comprehensive platform for developers to showcase projects, earn certifications, manage skills, and build professional networks through code reviews and badges.
  version: 1.0.0
  contact:
    name: DevRank Team

servers:
  - url: http://localhost:3000/api
    description: Development server
  - url: https://api.devrank.com
    description: Production server

paths:
  # ======================== USERS ENDPOINTS ========================
  /users/register:
    post:
      tags:
        - Users
      summary: Register a new user
      description: Create a new user account with email, password, name, role and optional profile information
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterUserRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: User with this email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users:
    get:
      tags:
        - Users
      summary: Get all users
      description: Retrieve a list of all users with their skills and profile information
      responses:
        '200':
          description: List of users retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
        '500':
          $ref: '#/components/responses/InternalError'

  /users/name/{name}:
    get:
      tags:
        - Users
      summary: Get user by name
      description: Retrieve a specific user by their username
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Username to search for
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{id}:
    get:
      tags:
        - Users
      summary: Get user by ID
      description: Retrieve a specific user by their ID with skills populated
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: User ID (MongoDB ObjectId)
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Users
      summary: Update user
      description: Update user profile information (name, bio, GitHub URL, avatar URL)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: User ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Users
      summary: Delete user
      description: Delete a user account and all associated data (projects, reviews, skills, etc.)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: User ID
      responses:
        '200':
          description: User deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{id}/skills:
    post:
      tags:
        - Users
      summary: Add skills to user
      description: Add one or more skills to a user's profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: User ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - skills
              properties:
                skills:
                  type: array
                  description: Array of skill IDs or names
                  items:
                    type: string
      responses:
        '200':
          description: Skill(s) assigned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Users
      summary: Remove multiple skills from user
      description: Remove multiple skills from a user's profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: User ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - skills
              properties:
                skills:
                  type: array
                  description: Array of skill IDs or names to remove
                  items:
                    type: string
      responses:
        '200':
          description: Skill(s) removed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{id}/skills/{skill}:
    delete:
      tags:
        - Users
      summary: Remove a single skill from user
      description: Remove a single skill by ID or name from a user's profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: User ID
        - name: skill
          in: path
          required: true
          schema:
            type: string
          description: Skill ID or name
      responses:
        '200':
          description: Skill removed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{id}/badges:
    post:
      tags:
        - Users
      summary: Award a badge to user by ID
      description: Award a specific badge to a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: User ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - badgeId
              properties:
                badgeId:
                  type: string
                  description: Badge ID (MongoDB ObjectId)
      responses:
        '200':
          description: Badge awarded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: User already has this badge

  /users/{id}/badges/name:
    post:
      tags:
        - Users
      summary: Award a badge to user by name
      description: Award a badge to a user by badge name (case-insensitive)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: User ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - badgeName
              properties:
                badgeName:
                  type: string
                  description: Badge name
      responses:
        '200':
          description: Badge awarded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: User already has this badge

  /users/{id}/badges/{badgeId}:
    delete:
      tags:
        - Users
      summary: Remove a badge from user by ID
      description: Remove a badge from a user by badge ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: User ID
        - name: badgeId
          in: path
          required: true
          schema:
            type: string
          description: Badge ID
      responses:
        '200':
          description: Badge removed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{id}/badges/name/{badgeName}:
    delete:
      tags:
        - Users
      summary: Remove a badge from user by name
      description: Remove a badge from a user by badge name (case-insensitive)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: User ID
        - name: badgeName
          in: path
          required: true
          schema:
            type: string
          description: Badge name
      responses:
        '200':
          description: Badge removed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/follow/{targetId}:
    post:
      tags:
        - Users
      summary: Follow a user
      description: Follow another user to see their activity and updates
      parameters:
        - name: targetId
          in: path
          required: true
          schema:
            type: string
          description: ID of the user to follow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
              properties:
                userId:
                  type: string
                  description: Your user ID
      responses:
        '200':
          description: User followed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Already following this user

  /users/unfollow/{targetId}:
    post:
      tags:
        - Users
      summary: Unfollow a user
      description: Stop following another user
      parameters:
        - name: targetId
          in: path
          required: true
          schema:
            type: string
          description: ID of the user to unfollow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
              properties:
                userId:
                  type: string
                  description: Your user ID
      responses:
        '200':
          description: User unfollowed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{userId}/followers:
    get:
      tags:
        - Users
      summary: Get user's followers
      description: Retrieve list of users following this user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: User ID
      responses:
        '200':
          description: Followers list retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  followers:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{userId}/following:
    get:
      tags:
        - Users
      summary: Get users this user is following
      description: Retrieve list of users being followed by this user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: User ID
      responses:
        '200':
          description: Following list retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  following:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'

  # ======================== PROJECTS ENDPOINTS ========================
  /projects:
    post:
      tags:
        - Projects
      summary: Create a new project
      description: Create a new project with title, description, technologies, and details
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  project:
                    $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: User not found

    get:
      tags:
        - Projects
      summary: Get all projects
      description: Retrieve all projects with optional filtering by userId, status, or techStack
      parameters:
        - name: userId
          in: query
          schema:
            type: string
          description: Filter by user ID
        - name: status
          in: query
          schema:
            type: string
            enum: [seeking-review, reviewed, archived]
          description: Filter by project status
        - name: techStack
          in: query
          schema:
            type: string
          description: Filter by technology
      responses:
        '200':
          description: Projects retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/BadRequest'

  /projects/title/{title}:
    get:
      tags:
        - Projects
      summary: Get project by title
      description: Retrieve a specific project by its title
      parameters:
        - name: title
          in: path
          required: true
          schema:
            type: string
          description: Project title
      responses:
        '200':
          description: Project found
          content:
            application/json:
              schema:
                type: object
                properties:
                  project:
                    $ref: '#/components/schemas/Project'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/user/{userId}:
    get:
      tags:
        - Projects
      summary: Get all projects by a user
      description: Retrieve all projects created by a specific user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: User ID
      responses:
        '200':
          description: Projects retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}:
    get:
      tags:
        - Projects
      summary: Get project by ID
      description: Retrieve a specific project by its ID with all details
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
          description: Project ID (MongoDB ObjectId)
      responses:
        '200':
          description: Project found
          content:
            application/json:
              schema:
                type: object
                properties:
                  project:
                    $ref: '#/components/schemas/Project'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Projects
      summary: Update project
      description: Update project details (title, description, technologies, etc.)
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
          description: Project ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: Project updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  project:
                    $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Projects
      summary: Delete project
      description: Delete a project and all associated reviews
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
          description: Project ID
      responses:
        '200':
          description: Project deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/reviews:
    get:
      tags:
        - Projects
      summary: Get reviews for a project
      description: Retrieve all reviews submitted for a specific project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
          description: Project ID
      responses:
        '200':
          description: Reviews retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  reviews:
                    type: array
                    items:
                      $ref: '#/components/schemas/Review'
        '404':
          $ref: '#/components/responses/NotFound'

  # ======================== REVIEWS ENDPOINTS ========================
  /reviews:
    post:
      tags:
        - Reviews
      summary: Create a new review
      description: Submit a review for a project as a verified reviewer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReviewRequest'
      responses:
        '201':
          description: Review created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  review:
                    $ref: '#/components/schemas/Review'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Only verified reviewers can submit reviews
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Already reviewed by this reviewer

    get:
      tags:
        - Reviews
      summary: Get all reviews
      description: Retrieve all reviews with optional filtering by projectId, reviewerId, or status
      parameters:
        - name: projectId
          in: query
          schema:
            type: string
          description: Filter by project ID
        - name: reviewerId
          in: query
          schema:
            type: string
          description: Filter by reviewer ID
        - name: status
          in: query
          schema:
            type: string
            enum: [published, removed]
          description: Filter by review status
      responses:
        '200':
          description: Reviews retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  reviews:
                    type: array
                    items:
                      $ref: '#/components/schemas/Review'
        '400':
          $ref: '#/components/responses/BadRequest'

  /reviews/{reviewId}:
    get:
      tags:
        - Reviews
      summary: Get review by ID
      description: Retrieve a specific review by its ID
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: string
          description: Review ID (MongoDB ObjectId)
      responses:
        '200':
          description: Review found
          content:
            application/json:
              schema:
                type: object
                properties:
                  review:
                    $ref: '#/components/schemas/Review'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Reviews
      summary: Update review
      description: Update review content or status
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: string
          description: Review ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReviewRequest'
      responses:
        '200':
          description: Review updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  review:
                    $ref: '#/components/schemas/Review'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Reviews
      summary: Delete review
      description: Delete a review
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: string
          description: Review ID
      responses:
        '200':
          description: Review deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'

  # ======================== SKILLS ENDPOINTS ========================
  /skills:
    post:
      tags:
        - Skills
      summary: Create a new skill
      description: Add a new skill to the platform
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSkillRequest'
      responses:
        '201':
          description: Skill created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  skill:
                    $ref: '#/components/schemas/Skill'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Skill already exists

    get:
      tags:
        - Skills
      summary: Get all skills
      description: Retrieve all skills with optional filtering by category or preset
      parameters:
        - name: category
          in: query
          schema:
            type: string
          description: Filter by category
        - name: preset
          in: query
          schema:
            type: boolean
          description: Filter by preset status
      responses:
        '200':
          description: Skills retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  skills:
                    type: array
                    items:
                      $ref: '#/components/schemas/Skill'
        '400':
          $ref: '#/components/responses/BadRequest'

  /skills/name/{name}:
    get:
      tags:
        - Skills
      summary: Get skill by name
      description: Retrieve a specific skill by name (case-insensitive)
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Skill name
      responses:
        '200':
          description: Skill found
          content:
            application/json:
              schema:
                type: object
                properties:
                  skill:
                    $ref: '#/components/schemas/Skill'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Skills
      summary: Update skill by name
      description: Update skill details by name
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Skill name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSkillRequest'
      responses:
        '200':
          description: Skill updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  skill:
                    $ref: '#/components/schemas/Skill'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Skill name already exists

    delete:
      tags:
        - Skills
      summary: Delete skill by name
      description: Delete a skill by name
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Skill name
      responses:
        '200':
          description: Skill deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'

  /skills/{skillId}:
    get:
      tags:
        - Skills
      summary: Get skill by ID
      description: Retrieve a specific skill by ID
      parameters:
        - name: skillId
          in: path
          required: true
          schema:
            type: string
          description: Skill ID (MongoDB ObjectId)
      responses:
        '200':
          description: Skill found
          content:
            application/json:
              schema:
                type: object
                properties:
                  skill:
                    $ref: '#/components/schemas/Skill'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Skills
      summary: Update skill by ID
      description: Update skill details by ID
      parameters:
        - name: skillId
