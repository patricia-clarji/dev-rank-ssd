components:
  schemas:
    # ======================== REQUEST SCHEMAS ========================
    RegisterUserRequest:
      type: object
      required:
        - name
        - email
        - password
        - role
      properties:
        name:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        role:
          type: string
          enum: [developer, reviewer]
        bio:
          type: string
          maxLength: 500
        githubUrl:
          type: string
          format: uri
        avatarUrl:
          type: string
          format: uri

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
        bio:
          type: string
          maxLength: 500
        githubUrl:
          type: string
          format: uri
        avatarUrl:
          type: string
          format: uri

    CreateProjectRequest:
      type: object
      required:
        - userId
        - title
        - description
      properties:
        userId:
          type: string
        title:
          type: string
        description:
          type: string
        techStack:
          type: array
          items:
            type: string
        repositoryUrl:
          type: string
          format: uri
        demoUrl:
          type: string
          format: uri

    UpdateProjectRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        techStack:
          type: array
          items:
            type: string
        repositoryUrl:
          type: string
          format: uri
        demoUrl:
          type: string
          format: uri

    CreateReviewRequest:
      type: object
      required:
        - projectId
        - reviewerId
        - overallRating
        - codeQualityScore
        - creativityScore
        - cleanCodeScore
      properties:
        projectId:
          type: string
        reviewerId:
          type: string
        overallRating:
          type: integer
          minimum: 1
          maximum: 5
        codeQualityScore:
          type: integer
          minimum: 1
          maximum: 5
        creativityScore:
          type: integer
          minimum: 1
          maximum: 5
        cleanCodeScore:
          type: integer
          minimum: 1
          maximum: 5
        wouldHire:
          type: boolean
        generalFeedback:
          type: string
          maxLength: 1000
        suggestions:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [published, removed]

    UpdateReviewRequest:
      type: object
      properties:
        overallRating:
          type: integer
          minimum: 1
          maximum: 5
        codeQualityScore:
          type: integer
          minimum: 1
          maximum: 5
        creativityScore:
          type: integer
          minimum: 1
          maximum: 5
        cleanCodeScore:
          type: integer
          minimum: 1
          maximum: 5
        wouldHire:
          type: boolean
        generalFeedback:
          type: string
          maxLength: 1000
        suggestions:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [published, removed]

    CreateSkillRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 2
        description:
          type: string
        category:
          type: string
        icon:
          type: string
          format: uri

    UpdateSkillRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
        description:
          type: string
        category:
          type: string
        icon:
          type: string
          format: uri

    CreateBadgeRequest:
      type: object
      required:
        - name
        - description
      properties:
        name:
          type: string
          minLength: 2
        description:
          type: string
          minLength: 10
        icon:
          type: string
        category:
          type: string
          enum: [achievement, skill-master, reviewer, contributor, other]
        criteria:
          type: string
          minLength: 5
        isActive:
          type: boolean

    UpdateBadgeRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
        description:
          type: string
          minLength: 10
        icon:
          type: string
        category:
          type: string
          enum: [achievement, skill-master, reviewer, contributor, other]
        criteria:
          type: string
          minLength: 5
        isActive:
          type: boolean

    CreateCertificationRequest:
      type: object
      required:
        - userId
        - certificationName
      properties:
        userId:
          type: string
        certificationName:
          type: string
        issuer:
          type: string
        certificationDate:
          type: string
          format: date
        expiryDate:
          type: string
          format: date

    # ======================== MODEL SCHEMAS ========================
    User:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [developer, reviewer]
        bio:
          type: string
        githubUrl:
          type: string
        avatarUrl:
          type: string
        isVerifiedReviewer:
          type: boolean
        skills:
          type: array
          items:
            $ref: '#/components/schemas/Skill'
        badges:
          type: array
          items:
            $ref: '#/components/schemas/Badge'
        followers:
          type: array
          items:
            type: string
        following:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Project:
      type: object
      properties:
        _id:
          type: string
        userId:
          type: string
        title:
          type: string
        description:
          type: string
        techStack:
          type: array
          items:
            type: string
        repositoryUrl:
          type: string
        demoUrl:
          type: string
        status:
          type: string
          enum: [seeking-review, reviewed, archived]
        aggregateRating:
          type: number
        aggregateCodeQuality:
          type: number
        aggregateCreativity:
          type: number
        aggregateCleanCode:
          type: number
        totalReviews:
          type: integer
        hireVotes:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Review:
      type: object
      properties:
        _id:
          type: string
        project:
          $ref: '#/components/schemas/Project'
        reviewer:
          $ref: '#/components/schemas/User'
        overallRating:
          type: integer
          minimum: 1
          maximum: 5
        codeQualityScore:
          type: integer
          minimum: 1
          maximum: 5
        creativityScore:
          type: integer
          minimum: 1
          maximum: 5
        cleanCodeScore:
          type: integer
          minimum: 1
          maximum: 5
        wouldHire:
          type: boolean
        generalFeedback:
          type: string
        suggestions:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [published, removed]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Skill:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        icon:
          type: string
        preset:
          type: boolean
        users:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Badge:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        description:
          type: string
        icon:
          type: string
        category:
          type: string
        criteria:
          type: string
        isActive:
          type: boolean
        users:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CertificationRequest:
      type: object
      properties:
        _id:
          type: string
        user:
          type: string
        certificationName:
          type: string
        issuer:
          type: string
        certificationDate:
          type: string
          format: date
        expiryDate:
          type: string
          format: date
        status:
          type: string
          enum: [pending, approved, rejected]
        approvalMessage:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ActivityLog:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        action:
          type: string
        entity:
          type: string
        entityId:
          type: string
        metadata:
          type: object
        timestamp:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        error:
          type: string
        errorCode:
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string

  responses:
    BadRequest:
      description: Bad request - validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
